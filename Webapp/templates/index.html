<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connect4 Web</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="logo">C4</div>
      <div>
        <div class="title">Connect4 Web</div>
        <div class="subtitle">Celina & Hamou</div>
      </div>
    </div>
  </header>

  <main class="layout">
    <!-- GAUCHE -->
    <aside class="sidebar">
      <div class="sideCard">
        <div class="sideTitle">Infos partie</div>

        <div class="stat">
          <div class="label">Mode de jeu</div>
          <select id="modeSelect" class="select">
            <option value="LOCAL">J vs J (locale)</option>
            <option value="ONLINE">J vs J (en ligne)</option>
            <option value="IA" selected>J vs IA</option>
          </select>
        </div>

        <div class="stat">
          <div class="label">Difficulté IA</div>
          <select id="diffSelect" class="select">
            <option value="easy">Facile</option>
            <option value="medium" selected>Moyen</option>
            <option value="hard">Difficile</option>
          </select>
        </div>

        <div class="sideCard">
          <div class="sideTitle">Paramètres joueur</div>

          <div class="stat">
            <div class="label">Nom rouge</div>
            <input id="playerNameR" type="text" placeholder="Joueur rouge" class="input" />
          </div>

          <div class="stat">
            <div class="label">Nom jaune</div>
            <input id="playerNameJ" type="text" placeholder="Joueur jaune / IA" class="input" />
          </div>

          <div class="stat">
            <div class="label">Qui commence ?</div>
            <select id="colorSelect" class="select">
              <option value="R" selected>Rouge commence</option>
              <option value="J">Jaune commence</option>
            </select>
          </div>
        </div>

        <button id="btnNew" class="btn primary full">Nouvelle partie</button>
        <button id="btnHint" class="btn full">IA jouerait (suggestion)</button>

        <div class="stat">
          <div class="label">Lien de la partie</div>
          <div class="value">
            <input id="shareLink" type="text" readonly class="input" />
            <button id="btnCopyLink" class="btn small" type="button">Copier</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- CENTRE -->
    <section class="content">
      <!-- ✅ Bandeau sticky pour mobile -->
      <div class="statusBar">
        <div id="turnInfo" class="statusLine">Chargement…</div>
        <div id="aiThinking" class="statusLine thinking" hidden>🤖 IA réfléchit…</div>
      </div>

      <div id="colHeader" class="colHeader"></div>

      <div class="boardWrap">
        <div id="board" class="board" aria-label="Plateau"></div>
      </div>
    </section>

    <!-- DROITE -->
    <aside class="rightbar">
      <div class="sideCard">
        <div class="sideTitle">Messages</div>
        <div class="message" id="message" hidden></div>
      </div>

      <div class="sideCard">
        <div class="sideTitle">Historique</div>
        <div id="history" class="historyLog"></div>
      </div>
    </aside>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
